# Production stack: web (nginx + Angular) on ${WEB_PORT:-80}, API and SQL Server internal-only.
# Usage:  cp .env.example .env   (set a strong SA_PASSWORD)
#         docker compose up -d --build
services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SA_PASSWORD:?set SA_PASSWORD in .env}
      MSSQL_PID: Express
    volumes:
      - lpg-mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q 'SELECT 1' -b"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  api:
    build:
      context: ../src
      dockerfile: LpgErp.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=LpgErp;User=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;"
      UseHttpsRedirect: "false"
    volumes:
      - lpg-api-logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ../src/LpgErp.WebApp
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  lpg-mssql-data:
  lpg-api-logs:
