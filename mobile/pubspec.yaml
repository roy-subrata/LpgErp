name: lpg_erp_mobile
description: LPG Cylinder Distribution ERP - Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.0
  riverpod_annotation: ^2.6.0
  dio: ^5.7.0
  go_router: ^14.8.0
  sqflite: ^2.4.0
  path: ^1.9.0
  intl: ^0.19.0
  shared_preferences: ^2.3.0
  connectivity_plus: ^6.1.0
  flutter_signature_pad: ^3.0.0
  geolocator: ^13.0.0
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.6.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
